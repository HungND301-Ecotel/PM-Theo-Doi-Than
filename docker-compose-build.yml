services:
  coal-tracking-reverse-proxy-service:
    build:
      context: ./reverse_proxy
    image: ${DOCKER_REGISTRY}/pmtdt-reverse-proxy-img:${IMAGE_TAG}
  coal-tracking-frontend-service:
    build:
      context: ./frontend
    image: ${DOCKER_REGISTRY}/pmtdt-frontend-img:${IMAGE_TAG}

  coal-tracking-backend_service:
    build:
      context: ./backend
      dockerfile: master-data-service/Dockerfile
    image: ${DOCKER_REGISTRY}/pmtdt-master-data-service:${IMAGE_TAG}
