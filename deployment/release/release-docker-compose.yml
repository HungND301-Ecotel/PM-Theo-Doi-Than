name: coal-tracking-release

services:
  # ============ INFRASTRUCTURE ============
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - backnet

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - backnet

  # ============ SERVICES ============
  master-data-service:
    image: ${DOCKER_REGISTRY}/pmtdt-master-data-service:${IMAGE_TAG}
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 8081
      DB_URL: ${MASTER_DATA_DB_URL}
      DB_USERNAME: ${MASTER_DATA_DB_USERNAME}
      DB_PASSWORD: ${MASTER_DATA_DB_PASSWORD}
      JWKS_URI: ${PORTAL_JWKS_URI}
      JAVA_OPTS: "-XX:MaxRAMPercentage=75 -XX:+UseG1GC"
    depends_on:
      postgres:
        condition: service_healthy
    restart: always
    healthcheck:
      test:
        ["CMD-SHELL", "curl -f http://localhost:8081/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3
    networks:
      - backnet

    # ============ FRONTEND ============
  frontend-service:
    image: ${DOCKER_REGISTRY}/pmtdt-frontend-img:${IMAGE_TAG}
    # target: development
    stdin_open: true
    environment:
      - TZ=Asia/Ho_Chi_Minh
    volumes:
      # For development only, to synced src code to container
      # - ./ecotel_frontend:/usr/src/app
      - /usr/src/app/node_modules
    restart: always
    networks:
      - frontnet
    # ports:
    #   - "3000:80"
    # depends_on:
    #   - ecotel_backend_service
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "30"

  # ============ REVERSE PROXY ============
  reverse-proxy-service:
    image: ${DOCKER_REGISTRY}/pmtdt-reverse-proxy-img:${IMAGE_TAG}
    ports:
      - "1188:8888" # HTTP plain, only used for debug
    stdin_open: true
    environment:
      - TZ=Asia/Ho_Chi_Minh
    restart: always
    volumes:
      - /etc/ssl/pmtdt:/etc/ssl/pmtdt:ro
    networks:
      - frontnet
      - backnet
    depends_on:
      - frontend-service
      - master-data-service
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "30"

networks:
  frontnet:
  backnet:

volumes:
  postgres_data:
  redis_data:
  nginx_logs:
