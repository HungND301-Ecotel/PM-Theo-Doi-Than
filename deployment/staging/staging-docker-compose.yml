name: coal-tracking-staging

services:
  # ============ INFRASTRUCTURE ============
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - backnet

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - backnet

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - backnet

  # ============ SERVICES ============
  reverse-proxy-service:
    image: ${DOCKER_REGISTRY}/pmtdt-reverse-proxy-img:${IMAGE_TAG:-latest}
    ports:
      # HOST_PORT:CONTAINER_PORT
      - "2526:8888"
    stdin_open: true
    environment:
      - TZ=Asia/Ho_Chi_Minh
    networks:
      - frontnet
      - backnet
    depends_on:
      - frontend-service
      - master-data-service

  frontend-service:
    image:
      ${DOCKER_REGISTRY}/pmtdt-frontend-img:${IMAGE_TAG:-latest}
      # target: development
    ports:
      # HOST_PORT:CONTAINER_PORT
      - "2527:80"
    stdin_open: true
    environment:
      - TZ=Asia/Ho_Chi_Minh
    volumes:
      # For development only, to synced src code to container
      - /usr/src/app/node_modules
      # restart: always
    networks:
      - frontnet
  master-data-service:
    env_file:
      - .env
    image: ${DOCKER_REGISTRY}/pmtdt-master-data-service:${IMAGE_TAG:-latest}
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 8081
      SPRING_DATASOURCE_URL: ${MASTER_DATA_DB_URL}
      SPRING_DATASOURCE_USERNAME: ${MASTER_DATA_DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${MASTER_DATA_DB_PASSWORD}

      PORTAL_JWKS_URI: ${PORTAL_JWKS_URI}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        ["CMD-SHELL", "curl -f http://localhost:8081/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3
    networks:
      - backnet

volumes:
  postgres_data:
    driver: local
    driver_opts:
      type: none
      device: /mnt/hdd/pmtdt_postgres_data
      o: bind
  pgadmin_data:
    driver: local
    driver_opts:
      type: none
      device: /mnt/hdd/pmtdt_pgadmin_data
      o: bind
  redis_data:
    driver: local
    driver_opts:
      type: none
      device: /mnt/hdd/pmtdt_redis_data
      o: bind
networks:
  frontnet:
  backnet:
