name: Deploy Release — Coal Tracking System

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-release
  cancel-in-progress: false

jobs:
  deploy-release:
    runs-on: ubuntu-latest
    # environment: production # yêu cầu approval thủ công trên GitHub trước khi chạy

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy init-db.sql into staging
        run: cp backend/init-db.sql deployment/staging/init-db.sql
      # ============ FRONTEND ENV ============
      - name: Create .env for frontend
        run: |
          cat > ./frontend/.env << EOF
          VITE_BASE_API=${{ secrets.VITE_BASE_API }}
          VITE_SOCKET_API=${{ secrets.VITE_SOCKET_API }}
          EOF

      # ============ BUILD & PUSH IMAGES ============
      - name: Build and push Docker images
        env:
          DOCKER_REGISTRY: ${{ secrets.DOCKER_REGISTRY }}
          DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
          DOCKER_HUB_ACCESS_TOKEN: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
          IMAGE_TAG: ${{ github.sha }}
        run: make release

      # ============ BACKEND ENV ============
      - name: Create .env for release deployment
        run: |
          cat > ./deployment/release/.env << EOF
          COMPOSE_PROJECT_NAME=coal-tracking-prod
          DOCKER_REGISTRY=${{ secrets.DOCKER_REGISTRY }}
          IMAGE_TAG=${{ github.sha }}

          # PostgreSQL
          POSTGRES_USER=${{ secrets.PROD_POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.PROD_POSTGRES_PASSWORD }}

          # Redis
          REDIS_PASSWORD=${{ secrets.PROD_REDIS_PASSWORD }}

          # Master Data Service
          MASTER_DATA_PORT=${{ secrets.MASTER_DATA_PORT }}
          MASTER_DATA_DB_URL=${{ secrets.PROD_MASTER_DATA_DB_URL }}
          MASTER_DATA_DB_USERNAME=${{ secrets.PROD_MASTER_DATA_DB_USERNAME }}
          MASTER_DATA_DB_PASSWORD=${{ secrets.PROD_MASTER_DATA_DB_PASSWORD }}

          # Order Service
          ORDER_SERVICE_PORT=${{ secrets.ORDER_SERVICE_PORT }}
          ORDER_DB_URL=${{ secrets.PROD_ORDER_DB_URL }}
          ORDER_DB_USERNAME=${{ secrets.PROD_ORDER_DB_USERNAME }}
          ORDER_DB_PASSWORD=${{ secrets.PROD_ORDER_DB_PASSWORD }}

          # Portal
          PORTAL_JWKS_URI=${{ secrets.PORTAL_JWKS_URI }}
          EOF

      # ============ TRANSFER FILES ============
      - name: Ensure target directory exists on VPS
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_PORT }}
          script: |
            mkdir -p /home/${{ secrets.PROD_USER }}/coal-tracking/deployment/release

      - name: Transfer deployment files to VPS
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_PORT }}
          source: "deployment/release/*"
          target: "/home/${{ secrets.PROD_USER }}/coal-tracking/deployment/release"
          strip_components: 2

      # ============ DEPLOY ============
      - name: Deploy to Production
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_PORT }}
          script: |
            cd /home/${{ secrets.PROD_USER }}/coal-tracking/deployment/release
            pwd && ls -al
            docker image prune -f
            docker compose -f release-docker-compose.yml down --remove-orphans
            chmod +x start-app.sh
            ./start-app.sh

      # ============ NOTIFY ============
      - name: Notify deployment successed
        if: success()
        run: echo "Deploy production successed - image: ${{ github.sha }}"

      - name: Notify deployment failed
        if: failure()
        run: echo "Deploy production failed - check logs"
